defaults:
  dump_format: "custom"

# Optional: configure S3-compatible shipping via pg_ship.sh
# ship:
#   bucket: my-backups
#   prefix: pgbackups          # key prefix inside the bucket (default: pgbackups)
#   endpoint: https://s3.garage.example.com   # omit for AWS S3

# Example configuration. Duplicate entries for each environment you use.
databases:
  app:
    local:
      pg_version: "16"
      host: localhost
      db: app
      user: app
      network: ""
    staging:
      pg_version: "16"
      host: 127.0.0.1
      db: app_staging
      user: app
    prod:
      pg_version: "16"
      host: db.example.com
      db: app
      user: app
      exclude_data:
        - audit_log
        - job_log

  analytics:
    local:
      pg_version: "16"
      host: localhost
      db: analytics
      user: analytics
      network: ""
    prod:
      pg_version: "16"
      host: analytics.example.com
      db: analytics
      user: analytics
      exclude_data:
        - large_events
        - raw_metrics
