name: pg-docker-tools-release

on:
  push:
    tags:
      - "pg-docker-tools-v*"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          VERSION="${TAG_NAME#pg-docker-tools-v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/pg-docker-tools:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/pg-docker-tools:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/pg-docker-tools:${{ steps.version.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/pg-docker-tools:latest
          build-args: |
            PG_CLIENT_VERSION=16
            YQ_VERSION=v4.44.1
